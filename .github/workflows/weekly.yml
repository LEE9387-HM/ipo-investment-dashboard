name: Weekly Summary Report

on:
  schedule:
    # 매주 월요일 오전 9시 KST (일요일 00:00 UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analyze.py (accuracy recalculation)
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ENVIRONMENT: real
        run: python scripts/analyze.py

      - name: Send weekly summary via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify.py weekly

      - name: Commit accuracy log update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/accuracy_log.csv
          git diff --staged --quiet || git commit -m "chore(data): weekly accuracy update $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
